# Postgres local (opcional). Para Supabase na nuvem use só DATABASE_URL no `.env`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: batmotor_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: batmotor
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
